name: Deploy Frontend to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy frontend to docs
        run: |
          cp -r frontend/* docs/
          touch docs/.nojekyll

      - name: Push docs to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet && echo "No changes" || (git commit -m "Update docs for GitHub Pages" && git push)
